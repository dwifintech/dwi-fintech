<!DOCTYPE html>
<html>
<head>
<title>DWI Fintech Admin</title>

<style>
body{
  background:#0b0e11;
  color:white;
  font-family:Arial;
  padding:20px;
}

h2{color:#f0b90b}

.card{
  background:#11161c;
  padding:15px;
  margin-bottom:20px;
  border-radius:8px;
}

button{
  background:#f0b90b;
  border:none;
  padding:6px 10px;
  margin-left:10px;
  cursor:pointer;
}

input{
  padding:6px;
  margin:5px;
  background:#1a222d;
  border:none;
  color:white;
}
</style>
</head>

<body>

<h2>DWI FINTECH ADMIN PANEL</h2>

<div class="card">
<h3>Deposits</h3>
<div id="deposits">Loading...</div>
</div>

<div class="card">
<h3>Withdrawals</h3>
<div id="withdrawals">Loading...</div>
</div>

<script>

// 🔐 SIMPLE ADMIN ACCESS
let pass = prompt("Enter admin password");

if(!pass || pass !== "DWI123"){
  alert("Access denied");
  window.location="index.html";
}

// 🔗 FIXED API
const API = "https://dwi-fintech-backend.onrender.com";

// 📥 LOAD DEPOSITS
async function loadDeposits(){
  try{
    let res = await fetch(API + "/admin/deposits");
    let data = await res.json();

    if(!data || data.length === 0){
      deposits.innerHTML = "No deposit requests";
      return;
    }

    deposits.innerHTML = data.map(d => `
      <p>
        <b>${d.email}</b> → $${d.amount} 
        [${d.status}]
      </p>
    `).join("");

  }catch{
    deposits.innerHTML = "Admin backend not ready";
  }
}

// 📤 LOAD WITHDRAWALS
async function loadWithdrawals(){
  try{
    let res = await fetch(API + "/admin/withdrawals");
    let data = await res.json();

    if(!data || data.length === 0){
      withdrawals.innerHTML = "No withdrawal requests";
      return;
    }

    withdrawals.innerHTML = data.map(w => `
      <p>
        <b>${w.email}</b> → $${w.amount} 
        [${w.status}]
      </p>
    `).join("");

  }catch{
    withdrawals.innerHTML = "Admin backend not ready";
  }
}

// 🔄 LOAD
loadDeposits();
loadWithdrawals();

</script>

</body>
</html>
