<!DOCTYPE html><html>
<head>
<title>DWI FINTECH</title><style>
body{background:#0b0e11;color:white;font-family:Arial;padding:20px;}
.card{background:#11161c;padding:15px;margin:15px;border-radius:8px;}
button{background:#f0b90b;border:none;padding:8px;cursor:pointer;}
input{padding:5px;margin:5px;}
</style></head><body><h2>DWI FINTECH 🚀</h2><div class="card">
<h3>Wallet: <span id="balance">0</span></h3>
<h3>Trading: <span id="subBalance">0</span></h3>
</div><div class="card">
<input id="amt" placeholder="Amount">
<button onclick="toSub()">Wallet → Trading</button><br><input id="amt2" placeholder="Amount">
<button onclick="toWallet()">Trading → Wallet</button>
</div><div class="card">
<h3>📊 Market</h3>
<p id="market"></p>
<button onclick="loadMarket()">Refresh</button>
</div><div class="card">
<h3>💱 Trade</h3>
<input id="amount" placeholder="USDT">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<button onclick="trade()">Execute</button>
</div><div class="card">
<h3>📊 Performance</h3>
<p id="perf"></p>
</div><script>

const API = "https://dwi-fintech-backend.onrender.com";
const token = localStorage.getItem("token");

// ================= USER =================
async function loadUser(){
  if(!token) return;
  const res = await fetch(API+"/api/me",{
    headers:{Authorization:"Bearer "+token}
  });
  const d = await res.json();
  balance.innerText = d.balance || 0;
  subBalance.innerText = d.subBalance || 0;
}

// ================= WALLET =================
async function toSub(){
  await fetch(API+"/api/move-to-sub",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({amount:Number(amt.value)})
  });
  loadUser();
}

async function toWallet(){
  await fetch(API+"/api/sub-to-wallet",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({amount:Number(amt2.value)})
  });
  loadUser();
}

// ================= MARKET =================
async function loadMarket(){
  const res = await fetch(API+"/api/market");
  const d = await res.json();
  market.innerText = JSON.stringify(d,null,2);
}

// ================= TRADE =================
async function trade(){
  await fetch(API+"/api/trade",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"P2P",
      amount:Number(amount.value),
      buyPrice:Number(buy.value),
      sellPrice:Number(sell.value)
    })
  });
  alert("Trade executed ✅");
}

// ================= PERFORMANCE =================
async function loadPerf(){
  const res = await fetch(API+"/api/performance");
  const d = await res.json();
  perf.innerText = JSON.stringify(d,null,2);
}

// ================= AUTO REFRESH =================
setInterval(()=>{
  loadUser();
  loadMarket();
  loadPerf();
},10000);

loadUser();

</script></body>
</html>
