<!DOCTYPE html>
<html>
<head>
<title>DWI Fintech</title>
<style>
body{background:#0b0e11;color:white;text-align:center;padding-top:100px;font-family:Arial}
input{padding:10px;margin:5px;background:#1a222d;color:white;border:none}
button{padding:10px;background:#f0b90b;border:none}
</style>
</head>

<body>

<h2>DWI FINTECH</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<script>
const API="https://dwi-fintech.onrender.com";

async function login(){
  let res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  let data = await res.json().catch(()=>null);

  if(!data){ alert("Invalid login"); return; }

  localStorage.setItem("email", data.email);
  window.location="app.html";
}

async function register(){
  let res = await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  alert(await res.text());
}
</script>

</body>
</html>
