<!DOCTYPE html>
<html>
<head>
  <title>DWI Fintech Wallet</title>
</head>
<body>

  <h1>DWI Fintech Wallet 💰</h1>

  <h2>Balance: <span id="balance">0</span></h2>

  <input type="number" id="amount" placeholder="Enter amount" />

  <br><br>

  <button onclick="getBalance()">Check Balance</button>
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>

  <p id="result"></p>

  <script>
    const BASE_URL = "https://dwi-fintech-backend.onrender.com";

    async function getBalance() {
      const res = await fetch(`${BASE_URL}/balance`);
      const data = await res.json();

      document.getElementById("balance").innerText = data.balance;
    }

    async function deposit() {
      const amount = parseFloat(document.getElementById("amount").value);

      const res = await fetch(`${BASE_URL}/deposit`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount })
      });

      const data = await res.json();

      document.getElementById("balance").innerText = data.balance;
      document.getElementById("result").innerText = data.message || data.error;
    }

    async function withdraw() {
      const amount = parseFloat(document.getElementById("amount").value);

      const res = await fetch(`${BASE_URL}/withdraw`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount })
      });

      const data = await res.json();

      document.getElementById("balance").innerText = data.balance || 0;
      document.getElementById("result").innerText = data.message || data.error;
    }

    // auto load balance on page open
    getBalance();
  </script>

</body>
</html>
