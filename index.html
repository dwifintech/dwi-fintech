<!DOCTYPE html>
<html>
<head>
  <title>DWI Fintech - Login</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b0e11;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:#11161c;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    h2 {
      color:#f0b90b;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      background:#1a222d;
      border:none;
      color:white;
    }

    button {
      width:100%;
      padding:10px;
      background:#f0b90b;
      border:none;
      cursor:pointer;
    }

    .link {
      margin-top:10px;
      font-size:14px;
      color:#aaa;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="card">
  <h2>DWI FINTECH</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="register()">Create Account</div>
</div>

<script>

const API = "https://dwi-fintech-backend.onrender.com";

// 🔐 LOGIN (FIXED)
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    // ✅ SAVE TOKEN (THIS FIXES YOUR ISSUE)
    localStorage.setItem("token", data.token);

    // ✅ REDIRECT
    window.location = "app.html";

  } else {
    alert(data.message || "Login failed");
  }
}

// 🆕 REGISTER QUICK (AUTO LOGIN)
async function register() {
  const email = prompt("Enter email");
  const password = prompt("Enter password");
  const name = prompt("Enter name");

  const res = await fetch(API + "/api/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();

  alert(data.message);

  // Auto login after register
  loginAuto(email, password);
}

// 🔁 AUTO LOGIN
async function loginAuto(email, password) {
  const res = await fetch(API + "/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location = "app.html";
  }
}

</script>

</body>
</html>
