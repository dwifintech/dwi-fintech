<!DOCTYPE html>
<html>
<head>
  <title>DWI Fintech App</title>
</head>
<body>

  <h1>DWI Fintech App</h1>

  <!-- USER -->
  <input id="username" placeholder="Your username" />
  <button onclick="register()">Register</button>

  <br><br>

  <!-- TRANSFER -->
  <input id="receiver" placeholder="Send to (username)" />
  <button onclick="transfer()">Send 50</button>

  <br><br>

  <!-- ACTIONS -->
  <button onclick="getBalance()">Check Balance</button>
  <button onclick="deposit()">Deposit 100</button>
  <button onclick="withdraw()">Withdraw 50</button>

  <p id="output"></p>

  <script>
    const BASE_URL = "https://dwi-fintech-backend.onrender.com";

    function getUsername() {
      return document.getElementById("username").value;
    }

    function getReceiver() {
      return document.getElementById("receiver").value;
    }

    async function register() {
      const username = getUsername();

      const res = await fetch(BASE_URL + "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data);
    }

    async function getBalance() {
      const username = getUsername();

      const res = await fetch(BASE_URL + "/balance/" + username);
      const data = await res.json();

      document.getElementById("output").innerText = JSON.stringify(data);
    }

    async function deposit() {
      const username = getUsername();

      const res = await fetch(BASE_URL + "/deposit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, amount: 100 })
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data);
    }

    async function withdraw() {
      const username = getUsername();

      const res = await fetch(BASE_URL + "/withdraw", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, amount: 50 })
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data);
    }

    async function transfer() {
      const from = getUsername();
      const to = getReceiver();

      const res = await fetch(BASE_URL + "/transfer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ from, to, amount: 50 })
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data);
    }
  </script>

</body>
</html>
