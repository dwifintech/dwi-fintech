<!DOCTYPE html>
<html>
<head>
  <title>DWI Fintech App</title>
</head>
<body>

<h1>DWI Fintech App</h1>

<!-- Register -->
<input id="username" placeholder="Enter username">
<button onclick="register()">Register</button>

<br><br>

<!-- Transfer -->
<input id="toUser" placeholder="Send to (username)">
<button onclick="sendMoney()">Send 50</button>

<br><br>

<!-- Actions -->
<button onclick="checkBalance()">Check Balance</button>
<button onclick="deposit()">Deposit 100</button>
<button onclick="withdraw()">Withdraw 50</button>

<p id="output"></p>

<script>
const BASE_URL = "https://dwi-fintech-backend.onrender.com";

function getUsername() {
  return document.getElementById("username").value;
}

// Register
async function register() {
  const username = getUsername();

  const res = await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username }) // ✅ CORRECT
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// Check Balance
async function checkBalance() {
  const username = getUsername();

  const res = await fetch(BASE_URL + "/balance", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username }) // ✅ CORRECT
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// Deposit
async function deposit() {
  const username = getUsername();

  const res = await fetch(BASE_URL + "/deposit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, amount: 100 }) // ✅ CORRECT
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// Withdraw
async function withdraw() {
  const username = getUsername();

  const res = await fetch(BASE_URL + "/withdraw", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, amount: 50 }) // ✅ CORRECT
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// Transfer
async function sendMoney() {
  const from = getUsername();
  const to = document.getElementById("toUser").value;

  const res = await fetch(BASE_URL + "/transfer", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ from, to, amount: 50 }) // ✅ CORRECT
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}
</script>

</body>
</html>
